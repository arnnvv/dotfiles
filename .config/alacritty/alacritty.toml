live_config_reload = true
import = ["~/.config/alacritty/theme.toml"]
[env]
TERM = "xterm-256color"
[window]
padding.x = 10
padding.y = 10
decorations = "none"
startup_mode = "Maximized"
opacity = 0.8
blur = true
option_as_alt = "Both"
[font]
size = 19.5
[font.normal]
family = "MesloLGS Nerd Font Mono"
[[keyboard.bindings]]
key = "N"
mods = "Control"
action = "ToggleMaximized"
